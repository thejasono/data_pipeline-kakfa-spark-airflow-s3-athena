# PostgreSQL Client Authentication Configuration File
# ==================================================
#
# This configuration is used by the docker-compose stack to allow Airflow and
# other services on the Docker network to connect to the database. The default
# file that ships with the official postgres image only allows connections from
# localhost which breaks inter-container communication. We extend it here to
# trust connections from the docker network using password authentication.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
# Use password authentication so the container can connect as the
# configured POSTGRES_USER during initialisation. When this file relied on
# `peer` auth the official postgres entrypoint failed because it connects
# as the Unix user `postgres` while attempting to authenticate as the
# configured database user (for example `airflow`).
local   all             all                                     scram-sha-256

# IPv4 local connections:
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 local connections:
host    all             all             ::1/128                 scram-sha-256

# Allow connections from any container on the docker network. In production you
# may want to scope this down to the specific subnet (e.g. 172.18.0.0/16).
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
